# ===============================================================
# NexT Theme Configuration Override
# See: https://theme-next.js.org/docs/getting-started/configuration
# ===============================================================

# ---------------------------------------------------------------
# Menu Settings
# ---------------------------------------------------------------
menu:
  home: / || fa fa-home
  about: /about/ || fa fa-user
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th
  archives: /archives/ || fa fa-archive

menu_settings:
  icons: true
  badges: false

# ---------------------------------------------------------------
# Post Settings
# ---------------------------------------------------------------
# Word count - using hexo-symbols-count-time instead
# symbols_count_time:
#   separated_meta: true
#   item_text_total: false
#   display:
#     post: true
#     total: true

# ---------------------------------------------------------------
# Search
# Dependencies: hexo-generator-searchdb
# ---------------------------------------------------------------
local_search:
  enable: true
  top_n_per_article: 1
  unescape: false
  preload: false

# ---------------------------------------------------------------
# Math Formulas (hexo-filter-mathjax)
# Enable by adding mathjax: true to front-matter
# ---------------------------------------------------------------
math:
  every_page: false
  mathjax:
    enable: true
    tags: none
  katex:
    enable: false
    copy_tex: false

# ---------------------------------------------------------------
# Pangu (hexo-pangu) - Chinese text spacing
# ---------------------------------------------------------------
pangu: true

# ---------------------------------------------------------------
# External Libraries
# ---------------------------------------------------------------
# Enable PJAX for faster page transitions
pjax: true

# FancyBox for image zoom
fancybox: true

# Lazy load images
lazyload: true

# ---------------------------------------------------------------
# Three.js (hexo-next-three)
# 3D effects - enable in specific posts with three: true
# ---------------------------------------------------------------
#three:
#  enable: true
#  three_waves: false
#  canvas_lines: false
#  canvas_sphere: false
#  canvas_random: true
#  show_code: false
#  distortion: false
#  color: rand
#  enable: true
#  three_waves: true
#  lines: false
#  sphere: false
#  random: false

# ---------------------------------------------------------------
# Fireworks (hexo-next-fireworks)
# Confetti effect - enable with fireworks: true in front-matter
# ---------------------------------------------------------------
#fireworks: true

# ---------------------------------------------------------------
# EXIF (hexo-next-exif)
# Display image EXIF metadata
# ---------------------------------------------------------------
exif: true

# ---------------------------------------------------------------
# Comments
# ---------------------------------------------------------------
comments:
  style: tabs
  active: giscus
  storage: true
  lazyload: false

giscus:
  enable: true
  repo: kevinchang1001/shanhe
  repository_id: R_kgDOOXXXXX
  category: General
  category_id: DIC_kwDOOXXXXX
  mapping: pathname
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  theme: preferred_color_scheme
  lang: zh-CN

# Valine Comment System (alternative)
# https://valine.js.org
#valine:
#  enable: false
#  appid: # Your Valine appid
#  appkey: # Your Valine appkey

# ---------------------------------------------------------------
# Table of Contents (TOC)
# ---------------------------------------------------------------
toc:
  enable: true
  number: true
  max_depth: 3
  min_depth: 1
  place: right
#  placeholder: 说点什么吧... # Comment input placeholder
#  avatar: mp # Avatar style
#  pageSize: 10 # Pagination size
#  lang: zh-CN
